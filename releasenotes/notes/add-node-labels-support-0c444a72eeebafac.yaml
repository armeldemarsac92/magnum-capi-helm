---
features:
  - |
    Adds support for passing node labels to worker nodes. Labels defined in
    the nodegroup configuration will be passed directly to the Kubernetes nodes
    when they are created via the Cluster API provider.
upgrade:
  - |
    Node labels can now be added to nodegroups by specifying them in the
    nodegroup labels field. These labels will be applied to all worker nodes
    in that nodegroup when they are created.
