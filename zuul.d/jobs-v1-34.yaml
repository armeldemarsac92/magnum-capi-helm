---
- project-template:
    name: magnum-capi-helm-tests-cluster-v1_34
    description: |
      Runs Magnum CAPI Helm v1.34 jobs
    check:
      jobs:
        - magnum-capi-helm-tests-cluster-v1_34
        - magnum-capi-helm-tests-cluster-v1_34-2026_1
        - magnum-capi-helm-tests-cluster-v1_34-cilium
    gate:
      jobs:
        - magnum-capi-helm-tests-cluster-v1_34
        - magnum-capi-helm-tests-cluster-v1_34-2026_1
        - magnum-capi-helm-tests-cluster-v1_34-cilium

- job:
    name: magnum-capi-helm-tests-cluster-v1_34-2026_1
    parent: magnum-capi-helm-tests-cluster-v1_34
    required-projects:
      - name: openstack/magnum
        override-checkout: stable/2026.1

- job:
    name: magnum-capi-helm-tests-cluster-v1_34
    parent: magnum-capi-helm-tests-cluster
    vars:
      kube_version: "v1.34.7"

- job:
    name: magnum-capi-helm-tests-cluster-v1_34-cilium
    parent: magnum-capi-helm-tests-cluster-v1_34
    vars:
      devstack_local_conf:
        post-config:
          $MAGNUM_CONF:
            cluster_template:
              kubernetes_allowed_network_drivers: flannel,calico,cilium
        test-config:
          $TEMPEST_CONFIG:
            magnum:
              network_driver: cilium
